name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Testes (H2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes
        run: mvn -B verify --no-transfer-progress
        working-directory: bankapi
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload relatório de falhas
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: bankapi/target/surefire-reports/

  build-prod:
    name: Build produção (JAR)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR de produção
        run: mvn -B clean package -DskipTests --no-transfer-progress
        working-directory: bankapi

      - name: Verificar JAR gerado
        run: ls -lh bankapi/target/*.jar
