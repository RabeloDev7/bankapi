services:
  - type: web
    name: bankapi
    runtime: docker
    plan: free
    region: oregon

    healthCheckPath: /actuator/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: DATABASE_URL
        fromDatabase:
          name: bankapi-db
          property: connectionString

databases:
  - name: bankapi-db
    databaseName: bankapi
    user: bankapi
    plan: free
    region: oregon
