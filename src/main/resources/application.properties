spring.application.name=bankapi

# ============================================================
# Desenvolvimento local — H2 in-memory
# Nao precisa de MySQL instalado para rodar localmente.
# Producao usa PostgreSQL via application-prod.properties
# ============================================================

spring.datasource.url=jdbc:h2:mem:bankapi_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 acessivel em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=3f8a2b1c9d4e7f6a0b5c8d2e1f4a7b3c9d6e2f5a8b1c4d7e0f3a6b9c2d5e8f1a
jwt.expiration=86400000
