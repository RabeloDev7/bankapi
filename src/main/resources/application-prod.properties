# ============================================================
# Perfil de PRODUCAO — Render.com
# DataSource configurado via DataSourceConfig.java
# que faz parse completo da DATABASE_URL (usuario, senha, host, porta, banco)
# ============================================================

# Impede que o Spring Boot tente criar seu proprio DataSource
# (DataSourceConfig.java ja fornece o bean @Primary)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Hibernate
# validate: verifica o schema sem tentar alterar (seguro em producao)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Porta dinamica do Render (padrao 10000)
server.port=${PORT:10000}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# DevTools desabilitado em producao
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator — somente health exposto sem autenticacao
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
