# ============================================================
# Perfil de PRODUCAO — Render.com
# DataSource configurado via DataSourceConfig.java
# ============================================================

# Impede que o Spring Boot tente criar seu proprio DataSource
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Hibernate — update cria tabelas se nao existirem e atualiza se necessario
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Suprime warning de seguranca sobre AuthenticationProvider
logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR

# Porta dinamica do Render (padrao 10000)
server.port=${PORT:10000}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# DevTools desabilitado em producao
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator — somente health exposto sem autenticacao
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
