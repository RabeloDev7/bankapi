# ============================================================
# Perfil de PRODUCAO — Render.com
# ============================================================

# O entrypoint.sh converte DATABASE_URL (postgresql://) para
# SPRING_DATASOURCE_URL (jdbc:postgresql://) antes de iniciar o app.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate detecta o dialect automaticamente pelo driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Porta dinamica injetada pelo Render (padrao 10000)
server.port=${PORT:10000}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# DevTools desabilitado em producao
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator — somente health exposto sem autenticacao
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
