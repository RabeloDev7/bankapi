# ============================================================
# Perfil de PRODUCAO — Render.com
# Todas as variaveis sensiveis vem de Environment Variables
# configuradas no dashboard do Render. Nunca commitar valores reais.
# ============================================================

# Banco PostgreSQL (fornecido pelo Render)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate — PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Porta dinamica do Render
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Desabilitar DevTools em producao
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator — apenas health exposto publicamente
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
