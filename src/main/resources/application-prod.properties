# ============================================================
# Perfil de PRODUCAO — Render.com
# O DataSource e configurado via DataSourceConfig.java,
# que converte DATABASE_URL para jdbc:postgresql:// em Java.
# ============================================================

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Porta dinamica do Render (padrao 10000)
server.port=${PORT:10000}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# DevTools desabilitado em producao
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator — somente health exposto sem autenticacao
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
