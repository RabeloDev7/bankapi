# ============================================================
# Perfil de PRODUCAO — Render.com + Supabase
# DataSource configurado via DataSourceConfig.java
# ============================================================

# Exclui autoconfiguracao de DataSource e H2 console (seguranca)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# Desabilita H2 console em producao
spring.h2.console.enabled=false

# Hibernate — update cria/atualiza tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Suprimir warnings desnecessarios em producao
logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR
logging.level.org.hibernate.tool.schema=WARN

# Porta dinamica do Render (padrao 10000)
server.port=${PORT:10000}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# DevTools desabilitado em producao
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator — somente health exposto sem autenticacao
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
